<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tàng Thư Các</title>

  <!-- Font chữ cổ điển -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif:wght@400;600&display=swap"
    rel="stylesheet"
  >

  <!-- Icon -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <h1>
      <i class="fa-solid fa-book-open"></i>
      Tàng Thư Các Cá Nhân
    </h1>

    <nav>
      <a href="../index.html">
        <i class="fa-solid fa-house"></i> Trang chủ
      </a>
      <a href="thu-vien-ten/name-library.html">
        <i class="fa-solid fa-scroll"></i> Thư viện tên
      </a>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="container">
    <!-- ===== FILTER ===== -->
    <section class="filter-box">
      <h2>
        <i class="fa-solid fa-feather"></i>
        Tra cứu truyện
      </h2>

      <form id="filters" class="filters">
        <div class="field">
          <label>
            <i class="fa-solid fa-book"></i> Tên truyện
          </label>
          <input type="text" id="search-title" placeholder="Nhập tên truyện..." />
        </div>

        <div class="field">
          <label>
            <i class="fa-solid fa-user-pen"></i> Tác giả
          </label>
          <input type="text" id="search-author" placeholder="Nhập tên tác giả..." />
        </div>

        <div class="field">
          <label>
            <i class="fa-solid fa-globe"></i> Quốc gia
          </label>
          <select id="filter-country">
            <option value="all">🌏 Tất cả</option>
            <option value="trung-quoc">🇨🇳 Trung Quốc</option>
            <option value="nhat-ban">🇯🇵 Nhật Bản</option>
            <option value="han-quoc">🇰🇷 Hàn Quốc</option>
            <option value="viet-nam">🇻🇳 Việt Nam</option>
            <option value="au-my">🌍 Âu Mỹ</option>
          </select>
        </div>

        <div class="field">
          <label>
            <i class="fa-solid fa-tags"></i> Thể loại
          </label>
          <select id="filter-genre">
            <option value="all">📚 Tất cả</option>
            <option value="tu-tien">🗡️ Tu Tiên</option>
            <option value="kiem-hiep">⚔️ Kiếm hiệp</option>
            <option value="dam-my">🌸 Đam mỹ</option>
            <option value="trinh-tham">🕵️ Trinh thám</option>
            <option value="xuyen-khong">🌀 Xuyên không</option>
            <option value="doi-thuong">🍵 Đời thường</option>
          </select>
        </div>
      </form>
    </section>

    <!-- ===== STORY LIST ===== -->
    <section class="story-box">
      <h2>
        <i class="fa-solid fa-books"></i>
        Danh mục truyện
      </h2>

      <ul id="story-list" class="story-list">
        <!-- JS render tại đây -->
      </ul>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>
      <i class="fa-solid fa-candle-holder"></i>
      © 2026 – Tàng Thư Các Cá Nhân
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
