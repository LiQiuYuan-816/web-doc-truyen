<script>
const list = document.getElementById("readingList");
const bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || {};

if (Object.keys(bookmarks).length === 0) {
  list.innerHTML = "<p>Chưa có truyện nào đang đọc</p>";
} else {
  for (const id in bookmarks) {
    const b = bookmarks[id];
    list.innerHTML += `
      <div class="reading-item">
        <strong>${b.novelTitle}</strong><br>
        <span>${b.chapterTitle}</span><br>
        <a href="${b.url}">👉 Đọc tiếp</a>
      </div>
      <hr>
    `;
  }
}
</script>

<script>
  const header = document.querySelector('.site-header');
  const main = document.querySelector('main.container');

  const SCROLL_DOWN_TRIGGER = 50;
  const SCROLL_UP_TRIGGER = 100;

  let isScrolled = false;

  function updateLayout() {
    if (!header || !main) return;

    const h = header.offsetHeight;
    main.style.paddingTop = (h + 50) + 'px';
    document.documentElement.style.setProperty('--header-height', h + 'px');
  }

  // 🔥 QUAN TRỌNG: chạy ngay khi DOM sẵn sàng
  document.addEventListener('DOMContentLoaded', updateLayout);
  window.addEventListener('load', updateLayout);
  window.addEventListener('resize', updateLayout);

  window.addEventListener('scroll', () => {
    const y = window.scrollY;

    if (!isScrolled && y > SCROLL_DOWN_TRIGGER) {
      header.classList.add('shrink');
      document.body.classList.add('scrolled');
      isScrolled = true;
      updateLayout();
    }

    if (isScrolled && y < SCROLL_UP_TRIGGER) {
      header.classList.remove('shrink');
      document.body.classList.remove('scrolled');
      isScrolled = false;
      updateLayout();
    }
  });
</script>
