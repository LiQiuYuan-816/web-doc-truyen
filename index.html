<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kho Truyện</title>
</head>
<body>
  <!-- ================= HEADER ================= -->
  <header>
    <h1>📚 Kho Truyện Của Tôi</h1>
  </header>
  <hr>
  <!-- ================= SEARCH & FILTER ================= -->
  <section id="filters">
    <!-- Tìm theo tên truyện -->
    <div>
      <label for="search-title">Tên truyện</label><br>
      <input
        type="text"
        id="search-title"
        placeholder="Nhập tên truyện..."
      >
    </div>
    <br>
    <!-- Tìm theo tác giả -->
    <div>
      <label for="search-author">Tác giả</label><br>
      <input
        type="text"
        id="search-author"
        placeholder="Nhập tên tác giả..."
      >
    </div>
    <br>
    <!-- Lọc theo quốc gia -->
    <div>
      <label for="filter-country">Quốc gia</label><br>
      <select id="filter-country">
        <option value="all">🌍 Tất cả</option>
        <option value="trung-quoc">🇨🇳 Trung Quốc</option>
        <option value="nhat-ban">🇯🇵 Nhật Bản</option>
        <option value="han-quoc">🇰🇷 Hàn Quốc</option>
        <option value="viet-nam">🇻🇳 Việt Nam</option>
        <option value="au-my">🌎 Âu Mỹ</option>
      </select>
    </div>
    <br>
    <!-- Lọc theo thể loại -->
    <div>
      <label for="filter-genre">Thể loại</label><br>
      <select id="filter-genre">
        <option value="all">📚 Tất cả</option>
        <option value="tu-tien">Tu Tiên</option>
        <option value="tay-huyen">Tây huyễn</option>
        <option value="xuyen-nhanh">Xuyên nhanh</option>
        <option value="xuyen-thu">Xuyên thư</option>
        <option value="lam-ruong">Làm ruộng</option>
        <option value="xay-dung">Xây dựng</option>
        <option value="quyen-muu">Quyền mưu</option>
        <option value="thuc-te-ao">Thực tế ảo</option>
        <option value="dien-canh">Điện cạnh</option>
        <option value="canh-ky">Cạnh kỹ</option>
        <option value="the-thao">Thể thao</option>
        <option value="khong-cp">Không CP</option>
        <option value="dam-my">Đam mỹ</option>
        <option value="chu-cong">Chủ công</option>
        <option value="chu-thu">Chủ thụ</option>
        <option value="tinh-te">Tinh tế</option>
        <option value="linh-gac-dan-duong">Lính gác dẫn đường</option>
        <option value="abo">ABO</option>
        <option value="co-giap">Cơ giáp</option>
        <option value="the-bai">Thẻ bài</option>
        <option value="doc-tam">Đọc tâm</option>
        <option value="doc-the">Đọc thể</option>
        <option value="xem-anh-the">Xem ảnh thể</option>
        <option value="ao-tuong">Ảo tưởng</option>
        <option value="cung-dinh-hau-tuoc">Cung đình hầu tước</option>
        <option value="duong-nhai-con">Dưỡng nhãi con</option>
        <option value="vuon-truong">Vườn trường</option>
        <option value="hoc-ba">Học bá</option>
        <option value="hai-huoc">Hài hước</option>
        <option value="am-ap">Ấm áp</option>
        <option value="ngon-tinh">Ngôn tình</option>
        <option value="nguyen-sang">Nguyên sang</option>
        <option value="dong-nhan">Đồng nhân</option>
        <option value="vo-han-luu">Vô hạn lưu</option>
        <option value="kiem-hiep">Kiếm hiệp</option>
        <option value="khoa-huyen">Khoa huyễn</option>
        <option value="gioi-giai-tri">Giới giải trí</option>
        <option value="tro-choi">Trò chơi</option>
        <option value="trinh-tham">Trinh thám</option>
        <option value="phat-song-truc-tiep">Phát sóng trực tiếp</option>
        <option value="xuyen-khong">Xuyên không</option>
        <option value="doi-thuong">Đời thường</option>
      </select>
    </div>
  </section>
  <hr>
   <!-- ================= FOOTER ================= -->
  <footer>
    <p>© 2026 – Web đọc truyện cá nhân</p>
  </footer>
  <!-- ================= SCRIPT ================= -->
  <script src="main.js"></script>
</body>
</html>
